name: Auto-merge returning groups

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - 'submissions/**'

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write

    steps:
      # ── 步骤 1：解析 PR 标题，提取年份和小组编号 ─────────────────────
      # 要求标题格式：[2026/T01-G03] 任意描述
      - name: Parse group ID from PR title
        id: parse
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.pull_request.title;
            const pr_number = context.payload.pull_request.number;
            const match = title.match(/\[(\d{4})\/(T\d+-G\d+)\]/i);

            if (!match) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr_number,
                body: [
                  '❌ **PR 标题格式不正确，已阻止自动处理。**',
                  '',
                  '请将 PR 标题修改为以下格式（点击标题旁的铅笔图标即可修改）：',
                  '```',
                  '[2026/T01-G03] 资产定价 · 第一次提交',
                  '```',
                  '修改后系统会自动重新检查。',
                ].join('\n'),
              });
              core.setFailed('PR 标题格式不符合要求');
              return;
            }

            const year = match[1];
            const groupId = match[2].toUpperCase();
            const expectedPrefix = `submissions/${year}/`;

            core.setOutput('year', year);
            core.setOutput('group_id', groupId);
            core.setOutput('expected_prefix', expectedPrefix);
            core.setOutput('parsed', 'true');
            console.log(`Parsed: year=${year}, group=${groupId}`);

      # ── 步骤 2：路径安全检查 ──────────────────────────────────────────
      # 规则1：所有文件必须在 submissions/{year}/ 下
      # 规则2：所有文件必须在本组文件夹下（防止误删/修改他组文件）
      - name: Check file paths
        id: path-check
        if: steps.parse.outputs.parsed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const pr_number = context.payload.pull_request.number;
            const expectedPrefix = '${{ steps.parse.outputs.expected_prefix }}';
            const groupId = '${{ steps.parse.outputs.group_id }}';

            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr_number,
            });

            const outsideSubmissions = files.filter(
              f => !f.filename.startsWith(expectedPrefix)
            );
            const wrongGroup = files.filter(f => {
              const parts = f.filename.split('/');
              if (parts.length < 3) return true;
              return !parts[2].toUpperCase().includes(groupId);
            });

            const errors = [];
            if (outsideSubmissions.length > 0) {
              errors.push(
                `**文件路径超出允许范围（\`${expectedPrefix}\` 以外）：**\n` +
                outsideSubmissions.map(f => `- \`${f.filename}\``).join('\n')
              );
            }
            if (wrongGroup.length > 0) {
              errors.push(
                `**包含不属于本小组（\`${groupId}\`）的文件夹：**\n` +
                wrongGroup.map(f => `- \`${f.filename}\``).join('\n')
              );
            }

            if (errors.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr_number,
                body: '⚠️ **路径检查未通过，已阻止自动合并，需教师介入：**\n\n' +
                      errors.join('\n\n'),
              });
              core.setFailed('路径检查未通过');
              core.setOutput('safe', 'false');
            } else {
              core.setOutput('safe', 'true');
            }

      # ── 步骤 3：检查是否为老成员 ─────────────────────────────────────
      - name: Check if author has a previously merged PR
        id: history-check
        if: steps.path-check.outputs.safe == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const author = context.payload.pull_request.user.login;
            const pr_number = context.payload.pull_request.number;

            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'closed',
              per_page: 100,
            });

            const hasMerged = prs.some(
              pr => pr.user.login === author &&
                    pr.merged_at !== null &&
                    pr.number !== pr_number
            );

            core.setOutput('has_merged', hasMerged ? 'true' : 'false');
            console.log(`Author: ${author} | Has merged before: ${hasMerged}`);

      # ── 步骤 4：老成员 → 自动合并 ────────────────────────────────────
      - name: Auto-approve and merge (returning group)
        if: |
          steps.path-check.outputs.safe == 'true' &&
          steps.history-check.outputs.has_merged == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const pr_number = context.payload.pull_request.number;
            const author = context.payload.pull_request.user.login;
            const groupId = '${{ steps.parse.outputs.group_id }}';

            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr_number,
              event: 'APPROVE',
              body: `✅ 路径检查通过，已识别为已注册小组（${groupId} / @${author}），自动合并。`,
            });
            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr_number,
              merge_method: 'squash',
              commit_title: `✅ ${context.payload.pull_request.title}`,
            });

      # ── 步骤 5：新成员 → 通知教师手动审核 ───────────────────────────
      - name: Comment for teacher review (new group)
        if: |
          steps.path-check.outputs.safe == 'true' &&
          steps.history-check.outputs.has_merged == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const pr_number = context.payload.pull_request.number;
            const author = context.payload.pull_request.user.login;
            const groupId = '${{ steps.parse.outputs.group_id }}';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr_number,
              body: [
                `👋 **新小组首次提交，等待教师或助教审核。**`,
                ``,
                `- 小组：${groupId}`,
                `- 提交账号：@${author}`,
                `- 路径检查：✅ 通过`,
                ``,
                `请教师或助教确认内容后手动合并。合并一次后，该账号后续提交将自动处理。`,
              ].join('\n'),
            });
